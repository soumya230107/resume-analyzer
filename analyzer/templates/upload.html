<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <!-- Tailwind CSS (via CDN for simplicity, or we can use custom CSS) -->
    <!-- Let's use vanilla CSS with a premium glassmorphic dark theme -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Decorative glowing orb */
        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(50px);
            opacity: 0.5;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(to right, #a8c0ff, #3f2b96);
            background: linear-gradient(to right, #c471ed, #f64f59);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            color: var(--text);
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #fileName {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: 600;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95rem;
        }

        #loadingOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <h3 style="color: white; font-weight: 600;">Analyzing Resume...</h3>
                <p style="color: #cbd5e1; font-size: 0.9rem; margin-top:5px;">Our AI is doing its magic ✨</p>
            </div>

            <div class="content">
                <div class="title">AI Resume Analyzer</div>
                <div class="subtitle">Powered by Google Gemini 1.5 Pro</div>

                {% if error %}
                <div class="error-message">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST" enctype="multipart/form-data" id="uploadForm">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="form-label">Upload Resume (PDF)</label>
                        <div class="upload-area" onclick="document.getElementById('fileInput').click()" id="dropZone">
                            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                            <p style="margin:0; font-size:1.1rem;">Click to browse or drag file here</p>
                            <span id="fileName"></span>
                        </div>
                        <input type="file" id="fileInput" name="resume" accept=".pdf" hidden required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Target Job Description</label>
                        <textarea name="job_description" rows="5" placeholder="Paste the full job description here..."
                            required></textarea>
                    </div>

                    <button type="submit" id="submitBtn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Analyze Fit
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('uploadForm');
        const loadingOverlay = document.getElementById('loadingOverlay');

        fileInput.addEventListener('change', function (e) {
            if (e.target.files.length > 0) {
                fileName.textContent = e.target.files[0].name;
                fileName.style.color = '#ec4899';
            }
        });

        form.addEventListener('submit', function () {
            loadingOverlay.style.display = 'flex';
        });
    </script>

</body>

</html>
